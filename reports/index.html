<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgroChain Reports Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ea;
      --panel: #fffdf8;
      --ink: #1f2933;
      --muted: #5f6c7b;
      --line: #e7dcc9;
      --accent: #0f766e;
      --good: #1f7a4d;
      --bad: #b42318;
      --warn: #b54708;
      --shadow: 0 18px 40px rgba(68, 52, 21, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 32px;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
        linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
      color: var(--ink);
    }

    .page { max-width: 1100px; margin: 0 auto; }

    header, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.05;
    }

    .subtitle, .muted {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin: 24px 0 4px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
    }

    .card.good { border-color: rgba(31, 122, 77, 0.25); }
    .card.bad { border-color: rgba(180, 35, 24, 0.25); }
    .card.warn { border-color: rgba(181, 71, 8, 0.25); }

    .label {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }

    .value {
      font-size: 2rem;
      font-weight: 700;
    }

    .suite {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .suite h2 {
      margin: 0 0 10px;
      font-size: 1.3rem;
      overflow-wrap: anywhere;
    }

    .suite-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--muted);
      margin-bottom: 18px;
      font-size: 0.95rem;
    }

    .tests {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    .test {
      border: 1px solid var(--line);
      border-left: 6px solid var(--accent);
      border-radius: 16px;
      padding: 14px 16px;
      background: #fff;
    }

    .test.failed { border-left-color: var(--bad); }
    .test.passed { border-left-color: var(--good); }
    .test.skipped { border-left-color: var(--warn); }

    .test-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .status {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .title {
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .duration {
      color: var(--muted);
      white-space: nowrap;
    }

    pre {
      margin: 14px 0 0;
      padding: 14px;
      border-radius: 12px;
      overflow: auto;
      background: #221b16;
      color: #f9f4eb;
      font-size: 0.87rem;
      line-height: 1.45;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    code {
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.95em;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 18px;
    }

    select {
      min-width: 220px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    iframe {
      width: 100%;
      min-height: 900px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }

    .report-link {
      display: block;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
    }

    .report-link strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1.05rem;
    }

    @media (max-width: 640px) {
      body { padding: 18px; }
      .test-header { grid-template-columns: 1fr; }
      .duration { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1>AgroChain Reports Dashboard</h1>
      <p class="subtitle">Use the dropdown to switch between frontend and backend test reports.</p>
      <div class="grid">
    <div class="card good">
      <div class="label">Frontend Tests</div>
      <div class="value">14/14</div>
    </div>
  
    <div class="card good">
      <div class="label">Backend Tests</div>
      <div class="value">27/27</div>
    </div>
  </div>
    </header>
    
    <section class="panel">
      <div class="report-grid">
        <a class="report-link" href="./frontend/test-report.html" target="report-frame">
          <strong>Frontend Tests</strong>
          <span class="muted">14 tests</span>
        </a>
        <a class="report-link" href="./backend/test-report.html" target="report-frame">
          <strong>Backend Tests</strong>
          <span class="muted">27 tests</span>
        </a>
      </div>
      <div class="toolbar">
        <label for="report-select"><strong>Select report:</strong></label>
        <select id="report-select">
          <option value="./frontend/test-report.html">Frontend tests</option>
          <option value="./backend/test-report.html">Backend tests</option>
        </select>
      </div>
    </section>
    <section class="panel">
      <iframe id="report-frame" name="report-frame" src="./frontend/test-report.html" title="AgroChain reports"></iframe>
    </section>
    <script>
      const select = document.getElementById("report-select");
      const frame = document.getElementById("report-frame");
      select.addEventListener("change", () => {
        frame.src = select.value;
      });
    </script>
  
  </div>
</body>
</html>
